version: 2
updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
    groups:
      dsp-core:
        patterns:
          - "numpy"
          - "scipy"
          - "librosa"
          - "soundfile"
          - "pyloudnorm"
      dev-tools:
        patterns:
          - "pytest*"
          - "ruff*"

  # GitHub Actions workflow dependencies (actions/checkout, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
